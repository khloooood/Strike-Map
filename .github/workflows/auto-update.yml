name: Auto-Update Strike Map

on:
  # Run every 2 hours
  schedule:
    - cron: '0 */2 * * *'

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run updater script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/update.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "StrikeMap Bot"
          git config user.email "bot@strikemap.local"
          git add -A
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          NEWS_COUNT=$(python -c "import json; d=json.load(open('data/news.json')); print(len(d))" 2>/dev/null || echo "?")
          git commit -m "🔄 Auto-update: ${TIMESTAMP} | ${NEWS_COUNT} total items"
          git push
